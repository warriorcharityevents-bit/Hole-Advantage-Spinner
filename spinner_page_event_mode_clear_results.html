<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Warrior Golf Prize Spinner</title>
  <style>
    :root{
      --bg:#edf1f4;
      --card:#ffffff;
      --navy:#1f3b5b;
      --teal:#157f79;
      --gold:#d4a72c;
      --cream:#f3e7c2;
      --border:#d7dce2;
      --text:#203040;
      --muted:#6a7786;
      --red:#b53a3a;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
      padding:20px;
    }
    .container{
      max-width:980px;
      margin:0 auto;
      display:grid;
      gap:20px;
    }
    .card{
      background:var(--card);
      border-radius:16px;
      padding:20px;
      box-shadow:0 6px 18px rgba(0,0,0,.08);
    }
    .header-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }
    .header-row h2{
      margin:0;
      color:var(--navy);
    }
    .top-buttons,
    .action-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    button{
      border:none;
      border-radius:10px;
      padding:12px 18px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      color:#fff;
      background:var(--navy);
    }
    button.green{ background:var(--teal); }
    #wheelWrap{
      position:relative;
      width:520px;
      margin:20px auto 0;
      max-width:100%;
    }
    #pointer{
      position:absolute;
      top:-6px;
      left:50%;
      transform:translateX(-50%);
      width:0;
      height:0;
      border-left:22px solid transparent;
      border-right:22px solid transparent;
      border-bottom:36px solid var(--gold);
      z-index:3;
      filter:drop-shadow(0 2px 3px rgba(0,0,0,.25));
    }
    canvas{
      display:block;
      width:520px;
      height:520px;
      max-width:100%;
      max-height:100%;
      margin:0 auto;
    }
    .player-row{
      max-width:420px;
      margin:18px auto 0;
    }
    input{
      width:100%;
      padding:12px 14px;
      border:1px solid #cfd5dc;
      border-radius:10px;
      font-size:16px;
    }
    .center-buttons{
      text-align:center;
      margin-top:16px;
    }
    .result{
      margin-top:18px;
      padding:16px;
      border-radius:12px;
      background:var(--cream);
      text-align:center;
      font-weight:700;
      font-size:24px;
      color:var(--navy);
    }
    .results-banner{
      text-align:center;
      padding:18px;
      border-radius:12px;
      background:var(--navy);
      color:#fff;
      font-size:30px;
      font-weight:800;
      letter-spacing:1px;
    }
    .log-table{
      width:100%;
      border-collapse:collapse;
      background:#fff;
      overflow:hidden;
      border-radius:12px;
    }
    .log-table th,
    .log-table td{
      padding:12px;
      border-bottom:1px solid #d9dee4;
      text-align:left;
      font-size:15px;
    }
    .log-table th{
      background:#f3f5f7;
      color:var(--navy);
    }
    .empty-state{
      color:var(--muted);
      text-align:center;
      padding:18px;
    }
    .small-note{
      font-size:13px;
      color:var(--muted);
      margin-top:8px;
    }
    @media (max-width:700px){
      body{ padding:14px; }
      #wheelWrap{ width:92vw; }
      canvas{ width:92vw; height:92vw; }
      .result{ font-size:20px; }
      .results-banner{ font-size:24px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header-row">
        <h2>Spin the wheel</h2>
        <div class="top-buttons">
          <button class="green" id="fullscreenBtn" type="button">Full Screen Event Mode</button>
        </div>
      </div>
      <div id="wheelWrap">
        <div id="pointer"></div>
        <canvas id="wheel" width="520" height="520"></canvas>
      </div>
      <div class="player-row">
        <input id="playerName" type="text" placeholder="Player name" />
      </div>
      <div class="center-buttons">
        <button id="spinBtn" type="button">Spin for a prize</button>
      </div>
      <div class="result" id="result">Ready to spin</div>
      <div class="small-note">Results auto-save in the browser. Prize setup is hidden.</div>
    </div>
    <div class="results-banner">RESULTS</div>
    <div class="card">
      <div class="action-row">
        <button class="green" id="exportBtn" type="button">Export Results to CSV</button>
      </div>
      <div style="margin-top:16px; overflow-x:auto;">
        <table class="log-table" id="resultsTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Player</th>
              <th>Prize</th>
            </tr>
          </thead>
          <tbody id="resultsBody">
            <tr>
              <td colspan="3" class="empty-state">No spins logged yet.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
  <script>
    const prizes=["No Putt On Green","Extra Mulligan Off Tee","Extra Throw","Beer Can Give-Me","Tee Off Women's Tee","Mulligan Anywhere"];
    const colors=["#1f9bd1","#ff7a11","#7d59eb","#1fb15b","#ed4aa4","#d8aa2c"];
    const STORAGE_KEY="warriorGolfSpinnerResults";
    const canvas=document.getElementById("wheel");
    const ctx=canvas.getContext("2d");
    const resultsBody=document.getElementById("resultsBody");
    const resultBox=document.getElementById("result");
    const playerInput=document.getElementById("playerName");
    const center=canvas.width/2;
    const radius=210;
    const arc=(Math.PI*2)/prizes.length;
    let rotation=0;
    let spinning=false;
    let spinCount=0;
    let results=loadResults();
    function loadResults(){try{const parsed=JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]");if(Array.isArray(parsed))return parsed;}catch(err){}return[];}
    function saveResults(){localStorage.setItem(STORAGE_KEY,JSON.stringify(results));}
    function escapeHtml(value){return String(value??"").replace(/[&<>"']/g,(m)=>({"\u0026":"\u0026amp;","\u003c":"\u0026lt;","\u003e":"\u0026gt;",'"':"\u0026quot;","'":"\u0026#39;"}[m]));}
    function drawWheel(){ctx.clearRect(0,0,canvas.width,canvas.height);for(let i=0;i<prizes.length;i++){const start=rotation+i*arc-Math.PI/2;const end=start+arc;ctx.beginPath();ctx.moveTo(center,center);ctx.arc(center,center,radius,start,end);ctx.closePath();ctx.fillStyle=colors[i];ctx.fill();ctx.save();ctx.translate(center,center);ctx.rotate(start+arc/2);ctx.fillStyle="white";ctx.font="bold 18px Arial";ctx.textAlign="right";wrapText(prizes[i],radius-16,0,145,20);ctx.restore();}ctx.beginPath();ctx.arc(center,center,36,0,Math.PI*2);ctx.fillStyle="#1f3b5b";ctx.fill();ctx.lineWidth=4;ctx.strokeStyle="#ffffff";ctx.stroke();}
    function wrapText(text,x,y,maxWidth,lineHeight){const words=text.split(" ");const lines=[];let line="";for(let i=0;i<words.length;i++){const testLine=line+words[i]+" ";if(ctx.measureText(testLine).width>maxWidth&&i>0){lines.push(line.trim());line=words[i]+" ";}else{line=testLine;}}lines.push(line.trim());const offset=((lines.length-1)*lineHeight)/2;lines.forEach((ln,index)=>{ctx.fillText(ln,x,y-offset+index*lineHeight);});}
    function renderResults(){if(!results.length){resultsBody.innerHTML=`<tr><td colspan="3" class="empty-state">No spins logged yet.</td></tr>`;spinCount=0;return;}spinCount=Math.max(...results.map(r=>Number(r.spin)||0));resultsBody.innerHTML=results.map((r)=>`<tr><td>${escapeHtml(r.spin)}</td><td>${escapeHtml(r.player)}</td><td>${escapeHtml(r.prize)}</td></tr>`).join("");}
    function logResult(player,prize){spinCount+=1;const entry={spin:spinCount,player:player||"Unknown",prize};results.unshift(entry);saveResults();renderResults();}
    function exportCSV(){if(!results.length)return;let csv="Spin,Player,Prize\n";[...results].reverse().forEach((row)=>{const player=String(row.player).replace(/"/g,'""');const prize=String(row.prize).replace(/"/g,'""');csv+=`${row.spin},"${player}","${prize}"\n`;});const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="spinner_results.csv";document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);}
    async function toggleFullscreenMode(){document.documentElement.classList.toggle("fullscreen-mode");try{if(!document.fullscreenElement){await document.documentElement.requestFullscreen?.();}else{await document.exitFullscreen?.();}}catch(err){}}
    function spin(){if(spinning)return;spinning=true;const player=playerInput.value.trim();const spinAngle=Math.random()*2000+2000;const duration=4000;let startTime=null;function animate(timestamp){if(!startTime)startTime=timestamp;const progress=timestamp-startTime;rotation=(spinAngle*(progress/duration))*Math.PI/180;drawWheel();if(progress<duration){requestAnimationFrame(animate);}else{const degrees=rotation*180/Math.PI+90;const arcd=360/prizes.length;const index=Math.floor((360-(degrees%360))/arcd)%prizes.length;const prize=prizes[index];resultBox.textContent="Winner: "+prize;logResult(player,prize);spinning=false;}}requestAnimationFrame(animate);}
    document.getElementById("spinBtn").addEventListener("click",spin);
    document.getElementById("exportBtn").addEventListener("click",exportCSV);
    document.getElementById("fullscreenBtn").addEventListener("click",toggleFullscreenMode);
    drawWheel();
    renderResults();
  </script>
</body>
</html>
