<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warrior Golf Prize Spinner</title>
</head>
<body>
    <h1>Warrior Golf Prize Spinner</h1>
    <div id="spinner"></div>
    <script>
        const spinnerElement = document.getElementById('spinner');
        const prizes = ['$100 Gift Card', 'Free Round of Golf', 'Golf Balls', 'Golf Club', 'T-Shirt'];

        function spin() {
            const randomIndex = Math.floor(Math.random() * prizes.length);
            const prize = prizes[randomIndex];
            alert(`Congratulations! You won: ${prize}`);
        }

        spinnerElement.addEventListener('click', spin);
    </script>
</body>
</html>
